name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform (skip if already exists)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping."
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest — permissions & geolocation
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Storage permissions
          if ! grep -q "WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />|' "$MANIFEST"
            echo "Storage permissions added."
          fi

          # Geolocation permissions
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />|' "$MANIFEST"
            echo "Location permissions added."
          fi

          # Enable geolocation di WebView — patch MainActivity
          MAIN="android/app/src/main/java/com/johanmadajmjm/tanimap/MainActivity.java"
          if [ -f "$MAIN" ] && ! grep -q "setGeolocationEnabled" "$MAIN"; then
            sed -i 's/public class MainActivity extends BridgeActivity {/public class MainActivity extends BridgeActivity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        bridge.getWebView().getSettings().setGeolocationEnabled(true);\n        bridge.getWebView().getSettings().setGeolocationDatabasePath(getFilesDir().getAbsolutePath());\n    }/' "$MAIN"
            # Tambah import Bundle
            sed -i '1s/^/import android.os.Bundle;\n/' "$MAIN"
            echo "WebView geolocation enabled."
          fi

          cat "$MANIFEST"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tanimap-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
